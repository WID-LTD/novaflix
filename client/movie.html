<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaFlix - Movie</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="top-bar">
    <a href="index.html" class="back-link">&larr; Back to Search</a>
  </nav>

  <div id="backdropWrap" class="backdrop-wrap">
    <div class="backdrop-overlay"></div>
  </div>

  <main class="container movie-page" id="moviePage">
    <div id="movieLoader" class="loader">Loading...</div>

    <div id="movieContent" style="display:none">
      <div class="movie-header">
        <div class="movie-poster">
          <img id="posterImg" src="" alt="Poster" />
        </div>
        <div class="movie-info">
          <h1 id="movieTitle"></h1>
          <div class="meta">
            <span id="movieYear"></span>
            <span class="dot">&middot;</span>
            <span id="movieRuntime"></span>
            <span class="dot">&middot;</span>
            <span id="movieRating"></span>
          </div>
          <div id="movieGenres" class="genres"></div>
          <p id="movieOverview" class="overview"></p>
          <div id="episodeSelector" class="episode-selector" style="display:none">
            <div class="selector-row">
              <label>Season</label>
              <select id="seasonSelect" class="selector"></select>
            </div>
            <div class="selector-row">
              <label>Episode</label>
              <select id="episodeSelect" class="selector"></select>
            </div>
          </div>
          <div id="episodeList" class="episode-list" style="display:none">
            <div class="episode-list-header">
              <label class="select-all-label">
                <input type="checkbox" id="selectAllEpisodes" />
                <span>Select All</span>
              </label>
              <span id="downloadStatus" class="download-status"></span>
              <button id="downloadSelectedBtn" class="btn btn-secondary btn-small">Download Selected (0)</button>
            </div>
            <div class="episode-checklist-wrap">
              <ul id="episodeChecklist" class="episode-checklist"></ul>
            </div>
          </div>
          <div class="actions">
            <a id="watchBtn" class="btn btn-primary" href="">Watch Now</a>
            <a id="downloadBtn" class="btn btn-secondary" href="">Download</a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div id="trailerSection" class="trailer-section" style="display:none">
    <div class="trailer-inner">
      <h2>Trailer</h2>
      <div class="trailer-wrap">
        <iframe id="trailerIframe" src="" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <!-- Download Modal -->
  <div id="downloadModal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3>Download</h3>
        <button id="modalCloseBtn" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <p id="modalFileTitle" class="modal-file-title"></p>
        <div id="modalQualityList" class="modal-quality-list"></div>
        <div id="modalBatchInfo" class="modal-batch-info" style="display:none"></div>
      </div>
      <div class="modal-footer">
        <span id="modalTotalSize" class="modal-total-size"></span>
        <button id="modalCancelBtn" class="btn btn-secondary btn-small">Cancel</button>
        <button id="modalConfirmBtn" class="btn btn-primary btn-small" disabled>Download</button>
      </div>
    </div>
  </div>

  <script src="js/movie.js"></script>
</body>
</html>
